    - data:
        code: "import re\nimport json\n\ndef format_fonte_principal(fp):\n    if not\
          \ isinstance(fp, dict) or not fp:\n        return \"Não identificada.\"\n\
          \    arquivo = fp.get(\"arquivo\", \"\")\n    item = fp.get(\"item\", \"\
          \")\n    return f\"Arquivo: {arquivo}\\nItem: {item}\".strip()\n\ndef safe_json_dumps(value):\n\
          \    try:\n        return json.dumps(value, ensure_ascii=False, indent=2)\n\
          \    except Exception:\n        return str(value)\n\ndef extract_text_from_retrieval(retrieved_context):\n\
          \    if isinstance(retrieved_context, str):\n        return retrieved_context.strip()\n\
          \n    if isinstance(retrieved_context, dict):\n        for key in [\"content\"\
          , \"text\", \"page_content\", \"chunk\", \"document\"]:\n            if\
          \ key in retrieved_context and retrieved_context[key]:\n               \
          \ return str(retrieved_context[key]).strip()\n        return safe_json_dumps(retrieved_context)\n\
          \n    if isinstance(retrieved_context, list):\n        parts = []\n    \
          \    for idx, item in enumerate(retrieved_context, start=1):\n         \
          \   if isinstance(item, dict):\n                title = (\n            \
          \        item.get(\"title\")\n                    or item.get(\"name\")\n\
          \                    or item.get(\"document_name\")\n                  \
          \  or item.get(\"file_name\")\n                    or \"\"\n           \
          \     )\n\n                content = (\n                    item.get(\"\
          content\")\n                    or item.get(\"text\")\n                \
          \    or item.get(\"page_content\")\n                    or item.get(\"chunk\"\
          )\n                    or item.get(\"document\")\n                    or\
          \ \"\"\n                )\n\n                metadata = item.get(\"metadata\"\
          , {})\n\n                block = []\n                if title:\n       \
          \             block.append(f\"[Trecho {idx} - Arquivo: {title}]\")\n\n \
          \               if metadata:\n                    item_ref = (\n       \
          \                 metadata.get(\"item\")\n                        or metadata.get(\"\
          section\")\n                        or metadata.get(\"heading\")\n     \
          \                   or metadata.get(\"source\")\n                      \
          \  or \"\"\n                    )\n                    if item_ref:\n  \
          \                      block.append(f\"Referência: {item_ref}\")\n\n   \
          \             if content:\n                    block.append(str(content).strip())\n\
          \                else:\n                    block.append(safe_json_dumps(item))\n\
          \n                parts.append(\"\\n\".join(block))\n            else:\n\
          \                parts.append(str(item))\n\n        return \"\\n\\n\".join(parts).strip()\n\
          \n    return str(retrieved_context or \"\").strip()\n\ndef normalize_clarified_output(clarified_output):\n\
          \    parsed = {}\n\n    if isinstance(clarified_output, str):\n        try:\n\
          \            parsed = json.loads(clarified_output)\n        except Exception:\n\
          \            parsed = {}\n    elif isinstance(clarified_output, dict):\n\
          \        parsed = clarified_output\n    else:\n        parsed = {}\n\n \
          \   if isinstance(parsed.get(\"structured_output\"), dict):\n        data\
          \ = parsed.get(\"structured_output\", {})\n    else:\n        data = parsed\n\
          \n    if not isinstance(data, dict) or \"pergunta_esclarecida\" not in data:\n\
          \        raw_text = parsed.get(\"text\", \"\")\n        if isinstance(raw_text,\
          \ str) and raw_text.strip():\n            try:\n                data = json.loads(raw_text)\n\
          \            except Exception:\n                data = {}\n\n    if not\
          \ isinstance(data, dict):\n        data = {}\n\n    fonte_principal = data.get(\"\
          fonte_principal\", {})\n    if not isinstance(fonte_principal, dict):\n\
          \        fonte_principal = {}\n\n    fontes_complementares = data.get(\"\
          fontes_complementares\", [])\n    if not isinstance(fontes_complementares,\
          \ list):\n        fontes_complementares = []\n\n    return {\n        \"\
          pergunta_esclarecida\": str(data.get(\"pergunta_esclarecida\", \"\") or\
          \ \"\"),\n        \"fonte_principal\": fonte_principal,\n        \"fontes_complementares\"\
          : fontes_complementares,\n        \"observacao\": str(data.get(\"observacao\"\
          , \"\") or \"\")\n    }\n\ndef format_fonte_principal(fp):\n    if not isinstance(fp,\
          \ dict) or not fp:\n        return \"Não identificada.\"\n    arquivo =\
          \ fp.get(\"arquivo\", \"\")\n    item = fp.get(\"item\", \"\")\n    return\
          \ f\"Arquivo: {arquivo}\\nItem: {item}\".strip()\n\ndef format_fontes_complementares(fc):\n\
          \    if not isinstance(fc, list) or not fc:\n        return \"Nenhuma.\"\
          \n    linhas = []\n    for i, fonte in enumerate(fc, start=1):\n       \
          \ if isinstance(fonte, dict):\n            arquivo = fonte.get(\"arquivo\"\
          , \"\")\n            item = fonte.get(\"item\", \"\")\n            linhas.append(f\"\
          {i}. Arquivo: {arquivo} | Item: {item}\")\n        else:\n            linhas.append(f\"\
          {i}. {str(fonte)}\")\n    return \"\\n\".join(linhas)\n\ndef format_codigos(codigos):\n\
          \    if not codigos:\n        return \"Nenhum.\"\n    return \", \".join(codigos)\n\
          \ndef main(retrieved_context, clarified_output) -> dict:\n    data = normalize_clarified_output(clarified_output)\n\
          \    text_original = extract_text_from_retrieval(retrieved_context)\n\n\
          \    pattern_codes_extract = r'[\\(\\[\\{]?(?:FE|PC|PE|OBS|FP|FA)\\s?\\\
          d+[\\)\\]\\}]?'\n    full_codes = re.findall(pattern_codes_extract, text_original)\n\
          \n    pattern_doc = r'EMS-[A-Za-zÀ-ÿ0-9_-]+(?:\\s+[A-Za-zÀ-ÿ0-9_-]+)*\\\
          s+[A-Z]{2}\\d+'\n\n    text_clean = re.sub(pattern_codes_extract, ' ', text_original)\n\
          \    text_clean = re.sub(pattern_doc, ' ', text_clean)\n    text_clean =\
          \ re.sub(r'\\s{2,}', ' ', text_clean).strip()\n\n    fonte_principal = data[\"\
          fonte_principal\"]\n    fontes_complementares = data[\"fontes_complementares\"\
          ]\n\n    return {\n        \"pergunta_esclarecida\": data[\"pergunta_esclarecida\"\
          ],\n        \"fonte_principal\": format_fonte_principal(data[\"fonte_principal\"\
          ]),\n        \"fontes_complementares\": format_fontes_complementares(data[\"\
          fontes_complementares\"]),\n        \"observacao\": data[\"observacao\"\
          ],\n        \"texto_original\": text_original,\n        \"texto_limpo\"\
          : text_clean,\n        \"codigos_detectados\": format_codigos(full_codes)\n\
          \    }\n"
