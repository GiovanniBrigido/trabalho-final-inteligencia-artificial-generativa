    - data:
        code: "import json\n\ndef main(arg1) -> dict:\n    \"\"\"\n    arg1 pode ser:\n\
          \    - dict (structured output do Dify)\n    - string JSON\n    - fallback\
          \ inválido\n    \"\"\"\n\n    # Normalização de entrada\n    if isinstance(arg1,\
          \ dict):\n        data = arg1\n    elif isinstance(arg1, str):\n       \
          \ try:\n            data = json.loads(arg1)\n        except:\n         \
          \   data = {}\n    else:\n        data = {}\n\n    melhorias = data.get(\"\
          melhorias\", [])\n    priorizacao_geral = data.get(\"priorizacao_geral\"\
          , \"N/A\")\n    resumo_executivo = data.get(\"resumo_executivo\", \"N/A\"\
          )\n\n    documents = []\n\n    # Documento resumo\n    documents.append({\n\
          \        \"title\": \"Resumo do Consultor de Melhoria\",\n        \"content\"\
          : (\n            f\"Priorização geral: {priorizacao_geral}\\n\"\n      \
          \      f\"Quantidade de melhorias: {len(melhorias)}\\n\"\n            f\"\
          Resumo executivo: {resumo_executivo}\"\n        ),\n        \"metadata\"\
          : {\n            \"priorizacao_geral\": priorizacao_geral,\n           \
          \ \"quantidade_melhorias\": len(melhorias),\n            \"resumo_executivo\"\
          : resumo_executivo\n        }\n    })\n\n    # Documentos individuais de\
          \ melhoria\n    for i, m in enumerate(melhorias, 1):\n        documents.append({\n\
          \            \"title\": f\"Melhoria {i} - {m.get('titulo', 'N/A')}\",\n\
          \            \"content\": (\n                f\"Título: {m.get('titulo',\
          \ 'N/A')}\\n\"\n                f\"Problema identificado: {m.get('problema_identificado',\
          \ 'N/A')}\\n\"\n                f\"Origem do apontamento: {m.get('origem_apontamento',\
          \ 'N/A')}\\n\"\n                f\"Local de ajuste no TR: {m.get('local_ajuste_tr',\
          \ 'N/A')}\\n\"\n                f\"Melhoria proposta: {m.get('melhoria_proposta',\
          \ 'N/A')}\\n\"\n                f\"Redação sugerida: {m.get('redacao_sugerida',\
          \ 'N/A')}\\n\"\n                f\"Justificativa prática: {m.get('justificativa_pratica',\
          \ 'N/A')}\\n\"\n                f\"Fundamento legal: {m.get('fundamento_legal',\
          \ 'N/A')}\\n\"\n                f\"Prioridade: {m.get('prioridade', 'N/A')}\"\
          \n            ),\n            \"metadata\": m\n        })\n\n    # JSON\
          \ bruto\n    documents.append({\n        \"title\": \"Dados Estruturados\
          \ do Consultor de Melhoria\",\n        \"content\": json.dumps(data, ensure_ascii=False,\
          \ indent=2),\n        \"metadata\": {\"tipo\": \"raw_json\"}\n    })\n\n\
          \    return {\n        \"context\": documents\n    }"
