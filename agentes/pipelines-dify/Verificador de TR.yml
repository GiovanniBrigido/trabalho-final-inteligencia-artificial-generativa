              RELATÓRIO DE MELHORIA:

              {{#1775603950755.context#}}


              --------------------------

              TAREFA:


              Com base no relatório de melhoria recebido:


              - identifique a priorização geral;

              - identifique a quantidade de melhorias propostas;

              - aplique as regras de decisão definidas para envio de email.


              Regras:

              - Se a priorização geral justificar envio, gere o email e chame OBRIGATORIAMENTE
              send_email

              - Se não justificar envio, retorne apenas: "Nenhum email necessário"


              Se houver envio:

              - use linguagem formal;

              - seja direto e objetivo;

              - baseie-se exclusivamente no relatório de melhoria;

              - não invente informações.


              Seja direto e objetivo.'
