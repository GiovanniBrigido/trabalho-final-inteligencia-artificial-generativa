    - data:
        agent_parameters:
          context:
            type: variable
            value:
            - '1775603950755'
            - context
          instruction:
            type: constant
            value: "Você é um agente responsável por decidir e executar o envio de\
              \ emails formais com base no relatório estruturado do Consultor de Melhoria.\n\
              \nVocê possui acesso à ferramenta:\n- send_email(to, subject, body)\n\
              \nOBJETIVO:\nAvaliar os dados recebidos e chamar automaticamente send_email\
              \ quando as condições forem atendidas.\n\nESTRUTURA DE ENTRADA:\n- priorizacao_geral:\
              \ \"ALTA\", \"MÉDIA\" ou \"BAIXA\"\n- melhorias: lista de melhorias\
              \ propostas\n- resumo_executivo: resumo geral das fragilidades identificadas\n\
              \nConsidere:\n- quantidade_melhorias = tamanho da lista \"melhorias\"\
              \n\nREGRAS DE DECISÃO:\n\n1. Enviar email se:\n   - priorizacao_geral\
              \ = \"ALTA\"\n   → tipo = \"REVISÃO URGENTE\"\n\n2. Enviar email se:\n\
              \   - priorizacao_geral = \"MÉDIA\"\n   → tipo = \"AJUSTES NECESSÁRIOS\"\
              \n\n3. Enviar email se:\n   - priorizacao_geral = \"BAIXA\"\n   E quantidade_melhorias\
              \ >= 1\n   → tipo = \"APERFEIÇOAMENTO\"\n\n4. NÃO enviar email se:\n\
              \   - priorizacao_geral = \"BAIXA\"\n   E quantidade_melhorias = 0\n\
              \nFLUXO:\n\n1. Leia os dados de entrada\n2. Calcule quantidade_melhorias\
              \ com base na lista \"melhorias\"\n3. Aplique as regras acima\n4. Se\
              \ NÃO enviar:\n   - Retorne apenas: \"Nenhum email necessário\"\n\n\
              5. Se enviar:\n   - Gere um assunto curto e direto\n   - Gere um corpo\
              \ formal, objetivo e baseado exclusivamente nos dados recebidos\n  \
              \ - Informe que o TR demanda revisão, ajuste ou aperfeiçoamento, conforme\
              \ o caso\n   - Chame a tool send_email\n\nREGRAS DE ESCRITA:\n\n- Linguagem\
              \ formal\n- Direto ao ponto\n- Baseado apenas nas análises fornecidas\n\
              - Sem inventar informações\n- Não mencionar informações ausentes nos\
              \ dados\n- Não reproduzir integralmente o JSON\n- Resumir apenas os\
              \ pontos mais relevantes para ação\n\nIMPORTANTE:\nSempre que as regras\
              \ indicarem envio, você DEVE chamar a tool send_email.\nSe as regras\
              \ não indicarem envio, você NÃO deve chamar nenhuma tool."
          model:
            type: constant
            value:
              completion_params:
                temperature: 0.7
                top_p: 0.9
              mode: chat
              model: google/gemini-2.5-flash-lite
              model_type: llm
              provider: langgenius/openrouter/openrouter
              type: model-selector
          query:
            type: constant
            value: '--------------------------

              DESTINATARIO:

              {{#env.mail_to#}}


